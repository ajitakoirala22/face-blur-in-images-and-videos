<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Face Blur Local App</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container">
    <h1>Face Blur (Image / Video)</h1>
    <p class="subtitle">Upload a file, process locally, and download blurred output.</p>

    <form id="uploadForm">
      <label for="file">Input file</label>
      <input id="file" name="file" type="file" accept="image/*,video/*" required>

      <div class="row">
        <div>
          <label for="confidence">Confidence</label>
          <input id="confidence" name="confidence" type="number" min="0.1" max="0.95" step="0.05" value="0.20">
        </div>
        <div>
          <label for="device">Device</label>
          <select id="device" name="device">
            <option value="auto" selected>Auto (GPU if available)</option>
            <option value="cpu">CPU</option>
            <option value="cuda">CUDA</option>
          </select>
        </div>
      </div>

      <label class="checkbox">
        <input id="enhance" name="enhance" type="checkbox">
        Enhance low-light/noisy frames
      </label>

      <button id="submitBtn" type="submit">Process</button>
      <p id="status"></p>
      <div id="progressWrap" class="hidden">
        <div id="progressTrack">
          <div id="progressFill"></div>
        </div>
        <p id="progressText">0%</p>
      </div>
    </form>

    <section id="result" class="hidden">
      <h2>Output</h2>
      <div id="preview"></div>
      <a id="downloadLink" href="#" download>Download output</a>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
